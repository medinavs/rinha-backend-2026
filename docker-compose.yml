services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    hostname: nginx-lb
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      - backend-1
      - backend-2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

  backend-1:
    image: medinavs/rinha-backend-2026:latest
    container_name: backend-1
    hostname: backend-1
    expose:
      - "8080"
    environment:
      - LISTEN_ADDR=:8080
      - REFERENCES_PATH=/app/resources/references.json.gz
      - NORMALIZATION_PATH=/app/resources/normalization.json
      - MCC_RISK_PATH=/app/resources/mcc_risk.json
      - GOMAXPROCS=1
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  backend-2:
    image: medinavs/rinha-backend-2026:latest
    container_name: backend-2
    hostname: backend-2
    expose:
      - "8080"
    environment:
      - LISTEN_ADDR=:8080
      - REFERENCES_PATH=/app/resources/references.json.gz
      - NORMALIZATION_PATH=/app/resources/normalization.json
      - MCC_RISK_PATH=/app/resources/mcc_risk.json
      - GOMAXPROCS=1
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

networks:
  backend:
    driver: bridge
