services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    hostname: nginx-lb
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      - backend-1
      - backend-2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

  backend-1:
    image: medinavs/rinha-backend-2026:v2
    container_name: backend-1
    hostname: backend-1
    expose:
      - "8080"
    environment:
      - LISTEN_ADDR=:8080
      - REFERENCES_PATH=/app/resources/references.bin
      - NORMALIZATION_PATH=/app/resources/normalization.json
      - MCC_RISK_PATH=/app/resources/mcc_risk.json
      - GOMAXPROCS=1
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"
    # healthcheck:
    #   test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ready"]
    #   interval: 1s
    #   timeout: 1s
    #   retries: 30

  backend-2:
    image: medinavs/rinha-backend-2026:v2
    container_name: backend-2
    hostname: backend-2
    expose:
      - "8080"
    environment:
      - LISTEN_ADDR=:8080
      - REFERENCES_PATH=/app/resources/references.bin
      - NORMALIZATION_PATH=/app/resources/normalization.json
      - MCC_RISK_PATH=/app/resources/mcc_risk.json
      - GOMAXPROCS=1
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"
    # healthcheck:
    #   test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ready"]
    #   interval: 1s
    #   timeout: 1s
    #   retries: 30

networks:
  backend:
    driver: bridge
